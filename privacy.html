<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>プライバシー | 日本語テキスト整形ツール</title>
    <meta
      name="description"
      content="日本語テキスト整形ツールのプライバシー情報です。入力内容はブラウザ内で処理され、保存しません。"
    />
    <meta name="robots" content="index,follow" />
    <meta name="theme-color" content="#f4efe7" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero hero-narrow">
        <p class="eyebrow">Privacy</p>
        <h1>プライバシー</h1>
        <p class="lead">このツールは、入力内容をブラウザ内で整形します。</p>
        <p class="note">サーバー保存や会員登録を前提にしない最小構成です。</p>
      </section>

      <section class="info-grid single-column">
        <article class="info-card prose-card">
          <h2>取り扱い</h2>
          <ul>
            <li>入力したテキストはブラウザ内で処理されます。</li>
            <li>入力内容や整形結果をこのツール側で保存しません。</li>
            <li>会員登録、ログイン、決済機能はありません。</li>
          </ul>
        </article>

        <article class="info-card prose-card">
          <h2>公開形態</h2>
          <ul>
            <li>このツールは静的ファイルとして公開されます。</li>
            <li>Cloudflare Web Analytics を使って、ページ表示などの基本的な利用計測を行っています。</li>
            <li>入力したテキスト本文は、この計測のために送信しません。</li>
          </ul>
        </article>
      </section>

      <footer class="site-footer">
        <a href="./index.html">ツールへ戻る</a>
      </footer>
    </main>
  </body>
</html>
